<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF5500;
  --gold:   #FFD700;
  --member: #00E87A;
  --admin:  #FFD700;
  --owner:  #FF5500;
  --normal: #CCCCCC;
  --panel-bg: rgba(10, 10, 10, 0.88);
  --dim: #888;
}

html, body {
  width: 2560px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Noto Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
}

#layout {
  display: flex;
  width: 2560px;
  height: 1080px;
}

/* ── 中间透明区域 ── */
#center {
  flex: 0 0 1920px;
  height: 1080px;
  background: transparent;
  pointer-events: none;
}

/* ── 通用侧边栏 ── */
.panel {
  flex: 0 0 320px;
  height: 1080px;
  background: var(--panel-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 斜线装饰 */
.sf6-stripe {
  flex-shrink: 0;
  height: 3px;
  background: repeating-linear-gradient(
    -45deg,
    var(--orange) 0px, var(--orange) 4px,
    #1e1e1e 4px, #1e1e1e 8px
  );
}

/* ══════════════════════════════
   左侧面板
   ══════════════════════════════ */

#cam-area {
  flex-shrink: 0;
  width: 320px;
  height: 240px;
  background: #000;
  position: relative;
}
#cam-area .cam-frame {
  position: absolute;
  inset: 0;
  border: 2px solid var(--orange);
  pointer-events: none;
}
#cam-area .cam-frame::before,
#cam-area .cam-frame::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  border-color: var(--gold);
  border-style: solid;
}
#cam-area .cam-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
#cam-area .cam-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
#cam-label {
  position: absolute;
  bottom: 0; left: 0;
  background: var(--orange);
  font-size: 10px; font-weight: 900;
  color: #fff; letter-spacing: 2px;
  padding: 2px 14px 2px 8px;
  text-transform: uppercase;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 100%, 0 100%);
}

/* 公告 */
#announcement-body {
  padding: 12px 12px;
  font-size: 16px;
  line-height: 1.7;
  color: #CCC;
  flex-shrink: 0;
}

/* 跑马灯 */
#ticker-wrap {
  margin-top: auto;
  flex-shrink: 0;
  background: var(--orange);
  overflow: hidden;
  height: 28px;
  display: flex;
  align-items: center;
}
#ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker 22s linear infinite;
}
.ticker-text {
  font-size: 14px; font-weight: 700;
  color: #fff; padding-right: 80px; letter-spacing: 0.5px;
}
@keyframes ticker {
  from { transform: translateX(320px); }
  to   { transform: translateX(-100%); }
}

/* ══════════════════════════════
   右侧弹幕面板
   ══════════════════════════════ */

#chat-list {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 6px 0 4px;
}

.msg {
  padding: 3px 10px;
  animation: fadeUp 0.18s ease-out;
  flex-shrink: 0;
  line-height: 1.5;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-text .row {
  display: flex; flex-wrap: wrap; gap: 3px; align-items: baseline;
}
.author { font-size: 15px; font-weight: 700; flex-shrink: 0; }
.author-0 { color: var(--normal); }
.author-1 { color: var(--member); }
.author-2 { color: var(--admin); }
.author-3 { color: var(--owner); }
.sep     { color: #444; font-size: 15px; flex-shrink: 0; }
.content { font-size: 16px; color: #DDD; word-break: break-all; }

.msg-gift .row   { font-size: 15px; color: var(--gold); }
.msg-gift .row::before   { content: '🎁 '; }
.msg-member .row { font-size: 15px; color: var(--member); }
.msg-member .row::before { content: '⚔ '; }

.msg-sc {
  margin: 5px 8px; padding: 5px 8px;
  border-left: 3px solid var(--orange);
  background: rgba(255,85,0,0.12);
}
.sc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.sc-author { font-size: 15px; font-weight: 700; color: var(--orange); }
.sc-price  { font-size: 13px; font-weight: 700; color: var(--gold); }
.sc-body   { font-size: 16px; color: #EEE; word-break: break-all; }
</style>
</head>
<body>
<div id="layout">

  <!-- 左侧信息面板 -->
  <div class="panel" id="left-panel">
    <div id="cam-area">
      <div class="cam-frame"></div>
      <span id="cam-label">PLAYER CAM</span>
    </div>
    <div class="sf6-stripe"></div>
    <div id="announcement-body"></div>
    <div id="ticker-wrap">
      <div id="ticker-track">
        <span class="ticker-text" id="ticker-text"></span>
        <span class="ticker-text" id="ticker-text2"></span>
      </div>
    </div>
  </div>

  <!-- 中间透明区域 -->
  <div id="center"></div>

  <!-- 右侧弹幕面板 -->
  <div class="panel" id="right-panel">
    <div id="chat-list"></div>
  </div>

</div>

<script src="./blcsdk.js"></script>
<script>
/* ── 弹幕 ── */
const MAX = 60
const list = document.getElementById('chat-list')
const TYPE_TEXT = 0, TYPE_GIFT = 1, TYPE_MEMBER = 2, TYPE_SC = 3

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function push(el) {
  list.appendChild(el)
  while (list.children.length > MAX) list.removeChild(list.firstChild)
}
function byId(id) { return list.querySelector(`[data-id="${CSS.escape(id)}"]`) }

class Handler extends blcsdk.MsgHandler {
  addMsg(msg) {
    switch (msg.type) {
      case TYPE_TEXT:   this._text(msg);   break
      case TYPE_GIFT:   this._gift(msg);   break
      case TYPE_MEMBER: this._member(msg); break
      case TYPE_SC:     this._sc(msg);     break
    }
  }
  _text(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-text'
    div.dataset.id = msg.id
    div.innerHTML = `<div class="row">
      <span class="author author-${msg.authorType ?? 0}">${esc(msg.authorName)}</span>
      <span class="sep">: </span>
      <span class="content">${esc(msg.content)}</span>
    </div>`
    push(div)
  }
  _gift(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-gift'
    div.dataset.id = msg.id
    const price = msg.price > 0 ? ` (¥${msg.price})` : ''
    div.innerHTML = `<div class="row">${esc(msg.authorName)} 送出 ${esc(msg.giftName)} ×${msg.num}${price}</div>`
    push(div)
  }
  _member(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-member'
    div.dataset.id = msg.id
    div.innerHTML = `<div class="row">${esc(msg.authorName)} 开通了舰长</div>`
    push(div)
  }
  _sc(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-sc'
    div.dataset.id = msg.id
    div.innerHTML = `<div class="sc-top">
      <span class="sc-author">${esc(msg.authorName)}</span>
      <span class="sc-price">¥${msg.price}</span>
    </div>
    <div class="sc-body">${esc(msg.content)}</div>`
    push(div)
  }
  delMsgs(ids) {
    for (const id of ids) { const el = byId(id); if (el) el.remove() }
  }
  updateMsg(id, vals) {
    const el = byId(id)
    if (!el || !vals.translation) return
    let t = el.querySelector('.translation')
    if (!t) {
      t = document.createElement('div')
      t.className = 'content translation'
      t.style.cssText = 'color:#999;font-size:14px'
      el.appendChild(t)
    }
    t.textContent = vals.translation
  }
}

blcsdk.setMsgHandler(new Handler())
blcsdk.init().catch(console.error)

/* ── 信息面板 ── */
async function loadContent() {
  try {
    const r = await fetch('./content.json?_=' + Date.now())
    if (!r.ok) return
    const data = await r.json()
    document.getElementById('announcement-body').textContent = data.announcement || ''
    const ticker = data.ticker || ''
    document.getElementById('ticker-text').textContent = ticker
    document.getElementById('ticker-text2').textContent = ticker
  } catch(e) { console.error('content.json 加载失败', e) }
}

loadContent()
setInterval(loadContent, 30000)
</script>
</body>
</html>
