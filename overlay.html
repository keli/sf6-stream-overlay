<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #FFFBF0;
  --bg2:     #FFF5E0;
  --orange:  #FF5500;
  --teal:    #00A896;
  --gold:    #FFB300;
  --rose:    #E8003D;
  --member:  #00875A;
  --admin:   #CC8000;
  --owner:   #E8003D;
  --normal:  #444;
  --text:    #1A1A1A;
  --border:  #DDCCBB;
  --dim:     #999;
}

html, body {
  width: 2560px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Noto Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
}

#layout {
  display: flex;
  width: 2560px;
  height: 1080px;
}

#center {
  flex: 0 0 1920px;
  height: 1080px;
  background: transparent;
  pointer-events: none;
}

/* ════════════════════════
   侧边栏
   ════════════════════════ */
.panel {
  flex: 0 0 320px;
  height: 1080px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 3px solid var(--border);
}

/* 顶部色条 */
.panel-top-bar {
  flex-shrink: 0;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    var(--orange) 0px,  var(--orange) 40px,
    var(--gold)   40px, var(--gold)   80px,
    var(--teal)   80px, var(--teal)  120px,
    var(--rose)  120px, var(--rose)  160px
  );
}

/* section 区块 */
.section {
  flex-shrink: 0;
  border-bottom: 2px solid var(--border);
}

.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 6px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.section-header .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-orange { background: var(--orange); }
.dot-teal   { background: var(--teal); }
.dot-gold   { background: var(--gold); }

.section-label {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
}

.section-body {
  padding: 14px 16px;
}

/* ════════════════════════
   摄像头
   ════════════════════════ */
#cam-area {
  flex-shrink: 0;
  width: 320px;
  height: 218px;
  background: #E8E0D0;
  position: relative;
  border-bottom: 2px solid var(--border);
}
#cam-area::before,
#cam-area::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-style: solid;
  border-color: var(--orange);
}
#cam-area::before { top: 10px; left: 10px;  border-width: 3px 0 0 3px; }
#cam-area::after  { top: 10px; right: 10px; border-width: 3px 3px 0 0; }
#cam-corner-bl, #cam-corner-br {
  position: absolute;
  width: 20px; height: 20px;
  border-style: solid;
  border-color: var(--teal);
}
#cam-corner-bl { bottom: 28px; left: 10px;  border-width: 0 0 3px 3px; }
#cam-corner-br { bottom: 28px; right: 10px; border-width: 0 3px 3px 0; }

#cam-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--orange);
  padding: 4px 12px;
  font-size: 11px; font-weight: 900;
  color: #fff; letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
}

/* ════════════════════════
   文字内容
   ════════════════════════ */
#announcement-body {
  font-size: 26px;
  font-weight: 900;
  line-height: 1.5;
  color: var(--text);
}

#schedule-body {
  font-size: 24px;
  font-weight: 900;
  line-height: 1.5;
  color: var(--teal);
}

/* ════════════════════════
   跑马灯
   ════════════════════════ */
#ticker-wrap {
  margin-top: auto;
  flex-shrink: 0;
  background: var(--teal);
  overflow: hidden;
  height: 36px;
  display: flex;
  align-items: center;
  border-top: 2px solid var(--border);
}
#ticker-wrap::before {
  content: '▶';
  flex-shrink: 0;
  color: #fff;
  font-size: 11px;
  padding: 0 10px;
}
#ticker-track {
  flex: 1;
  display: flex;
  white-space: nowrap;
  animation: ticker 22s linear infinite;
}
.ticker-text {
  font-size: 16px; font-weight: 900;
  color: #fff; padding-right: 80px;
}
@keyframes ticker {
  from { transform: translateX(320px); }
  to   { transform: translateX(-100%); }
}

/* ════════════════════════
   弹幕气泡
   ════════════════════════ */
#chat-list {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 6px 0 4px;
}

.msg {
  display: flex;
  align-items: flex-start;
  padding: 5px 10px;
  gap: 8px;
  animation: fadeUp 0.18s ease-out;
  flex-shrink: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 42px; height: 42px;
  border-radius: 8px;
  flex-shrink: 0;
  object-fit: cover;
  background: var(--bg2);
  border: 2px solid var(--border);
}

.bubble {
  background: #fff;
  border: 2px solid var(--border);
  border-radius: 0 12px 12px 12px;
  padding: 6px 12px;
  max-width: 242px;
  word-break: break-all;
  box-shadow: 2px 2px 0 var(--border);
}

.bubble-author {
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 3px;
}
.author-0 { color: var(--normal); }
.author-1 { color: var(--member); }
.author-2 { color: var(--admin); }
.author-3 { color: var(--owner); }

.bubble-content {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

/* 礼物 / 舰长 */
.msg-inline {
  display: flex;
  padding: 3px 10px;
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
}
.inline-text {
  font-size: 16px; font-weight: 900;
  padding: 4px 14px;
  border-radius: 20px;
  border: 2px solid;
}
.msg-gift   .inline-text { color: #7A5500; background: #FFF8DC; border-color: var(--gold); }
.msg-member .inline-text { color: var(--member); background: #E6FAF5; border-color: #80D4BD; }

/* 醒目留言 */
.msg-sc-wrap {
  margin: 6px 10px;
  padding: 10px 12px;
  background: #FFF5F7;
  border: 2px solid #FFB3C1;
  border-left: 5px solid var(--rose);
  border-radius: 0 10px 10px 0;
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
  box-shadow: 2px 2px 0 #FFB3C1;
}
.sc-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid #FFB3C1;
}
.sc-author { font-size: 17px; font-weight: 900; color: var(--rose); }
.sc-price  { font-size: 15px; font-weight: 900; color: var(--gold); }
.sc-body   { font-size: 22px; font-weight: 700; color: var(--text); word-break: break-all; }
</style>
</head>
<body>
<div id="layout">

  <!-- 左侧信息面板 -->
  <div class="panel" id="left-panel">
    <div class="panel-top-bar"></div>

    <div id="cam-area">
      <div id="cam-corner-bl"></div>
      <div id="cam-corner-br"></div>
      <div id="cam-label">● PLAYER CAM</div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="dot dot-orange"></span>
        <span class="section-label">公告</span>
      </div>
      <div class="section-body">
        <div id="announcement-body"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="dot dot-teal"></span>
        <span class="section-label">今日节目</span>
      </div>
      <div class="section-body">
        <div id="schedule-body"></div>
      </div>
    </div>

    <div id="ticker-wrap">
      <div id="ticker-track">
        <span class="ticker-text" id="ticker-text"></span>
        <span class="ticker-text" id="ticker-text2"></span>
      </div>
    </div>
  </div>

  <!-- 中间透明 -->
  <div id="center"></div>

  <!-- 右侧弹幕 -->
  <div class="panel" id="right-panel">
    <div class="panel-top-bar"></div>
    <div id="chat-list"></div>
  </div>

</div>

<script src="./blcsdk.js"></script>
<script>
const MAX = 60
const list = document.getElementById('chat-list')
const TYPE_TEXT = 0, TYPE_GIFT = 1, TYPE_MEMBER = 2, TYPE_SC = 3

const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="42" height="42"><rect width="42" height="42" rx="8" fill="%23DDD"/></svg>'

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function push(el) {
  list.appendChild(el)
  while (list.children.length > MAX) list.removeChild(list.firstChild)
}
function byId(id) { return list.querySelector(`[data-id="${CSS.escape(id)}"]`) }

class Handler extends blcsdk.MsgHandler {
  addMsg(msg) {
    switch (msg.type) {
      case TYPE_TEXT:   this._text(msg);   break
      case TYPE_GIFT:   this._gift(msg);   break
      case TYPE_MEMBER: this._member(msg); break
      case TYPE_SC:     this._sc(msg);     break
    }
  }
  _text(msg) {
    const div = document.createElement('div')
    div.className = 'msg'
    div.dataset.id = msg.id
    const av = msg.avatarUrl || DEFAULT_AVATAR
    div.innerHTML = `
      <img class="msg-avatar" src="${esc(av)}" onerror="this.src='${DEFAULT_AVATAR}'">
      <div class="bubble">
        <div class="bubble-author author-${msg.authorType ?? 0}">${esc(msg.authorName)}</div>
        <div class="bubble-content">${esc(msg.content)}</div>
      </div>`
    push(div)
  }
  _gift(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-gift'
    div.dataset.id = msg.id
    const price = msg.price > 0 ? ` ¥${msg.price}` : ''
    div.innerHTML = `<span class="inline-text">🎁 ${esc(msg.authorName)} · ${esc(msg.giftName)} ×${msg.num}${price}</span>`
    push(div)
  }
  _member(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-member'
    div.dataset.id = msg.id
    div.innerHTML = `<span class="inline-text">⚔ ${esc(msg.authorName)} 开通了舰长</span>`
    push(div)
  }
  _sc(msg) {
    const div = document.createElement('div')
    div.className = 'msg-sc-wrap'
    div.dataset.id = msg.id
    div.innerHTML = `
      <div class="sc-top">
        <span class="sc-author">${esc(msg.authorName)}</span>
        <span class="sc-price">¥${msg.price}</span>
      </div>
      <div class="sc-body">${esc(msg.content)}</div>`
    push(div)
  }
  delMsgs(ids) {
    for (const id of ids) { const el = byId(id); if (el) el.remove() }
  }
  updateMsg(id, vals) {
    const el = byId(id)
    if (!el || !vals.translation) return
    let t = el.querySelector('.translation')
    if (!t) {
      t = document.createElement('div')
      t.className = 'bubble-content translation'
      t.style.cssText = 'color:#999;font-size:16px'
      el.querySelector('.bubble')?.appendChild(t)
    }
    t.textContent = vals.translation
  }
}

blcsdk.setMsgHandler(new Handler())
blcsdk.init().catch(console.error)

async function loadContent() {
  try {
    const r = await fetch('./content.json?_=' + Date.now())
    if (!r.ok) return
    const data = await r.json()
    document.getElementById('announcement-body').textContent = data.announcement || ''
    document.getElementById('schedule-body').textContent = data.schedule || ''
    const t = data.ticker || ''
    document.getElementById('ticker-text').textContent = t
    document.getElementById('ticker-text2').textContent = t
  } catch(e) { console.error('content.json 加载失败', e) }
}

loadContent()
setInterval(loadContent, 30000)
</script>
</body>
</html>
