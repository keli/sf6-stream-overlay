<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange:  #FF5500;
  --gold:    #FFB800;
  --member:  #00B96B;
  --admin:   #E6A000;
  --owner:   #FF5500;
  --normal:  #444;
  --panel-bg: #FFF8F2;
  --panel-border: #FFD0B0;
  --text:    #2A2A2A;
  --dim:     #888;
  --bubble-bg: #FFFFFF;
  --bubble-border: #F0D8C8;
}

html, body {
  width: 2560px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Noto Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
}

#layout {
  display: flex;
  width: 2560px;
  height: 1080px;
}

#center {
  flex: 0 0 1920px;
  height: 1080px;
  background: transparent;
  pointer-events: none;
}

.panel {
  flex: 0 0 320px;
  height: 1080px;
  background: var(--panel-bg);
  border: 3px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 波点背景纹理 */
.panel::before {
  content: '';
  position: absolute;
  inset: 0;
  width: 320px;
  height: 1080px;
  background-image: radial-gradient(circle, #FFCCAA 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.25;
  pointer-events: none;
}

.sf6-stripe {
  flex-shrink: 0;
  height: 4px;
  background: repeating-linear-gradient(
    -45deg,
    var(--orange) 0px, var(--orange) 5px,
    #FFD0B0 5px, #FFD0B0 10px
  );
}

/* ══ 左侧面板 ══ */

#cam-area {
  flex-shrink: 0;
  width: 320px;
  height: 240px;
  background: #EEE;
  position: relative;
  border-bottom: 3px solid var(--panel-border);
}
#cam-area .cam-frame {
  position: absolute;
  inset: 0;
  border: 3px solid var(--orange);
  border-radius: 4px;
  pointer-events: none;
}
#cam-area .cam-frame::before,
#cam-area .cam-frame::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--gold);
  border-style: solid;
}
#cam-area .cam-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
#cam-area .cam-frame::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
#cam-label {
  position: absolute;
  bottom: 0; left: 0;
  background: var(--orange);
  font-size: 11px; font-weight: 900;
  color: #fff; letter-spacing: 2px;
  padding: 3px 16px 3px 8px;
  text-transform: uppercase;
  border-radius: 0 8px 0 0;
}

#announcement-body {
  padding: 16px 16px 8px;
  font-size: 22px;
  font-weight: 900;
  line-height: 1.6;
  color: var(--text);
  flex-shrink: 0;
}

#schedule-body {
  padding: 0 16px 16px;
  font-size: 19px;
  font-weight: 700;
  line-height: 1.6;
  color: var(--orange);
  flex-shrink: 0;
}

#ticker-wrap {
  margin-top: auto;
  flex-shrink: 0;
  background: var(--orange);
  overflow: hidden;
  height: 32px;
  display: flex;
  align-items: center;
}
#ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker 22s linear infinite;
}
.ticker-text {
  font-size: 15px; font-weight: 700;
  color: #fff; padding-right: 80px;
}
@keyframes ticker {
  from { transform: translateX(320px); }
  to   { transform: translateX(-100%); }
}

/* ══ 右侧弹幕（微信气泡） ══ */

#chat-list {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 6px 0 4px;
}

.msg {
  display: flex;
  align-items: flex-start;
  padding: 4px 10px;
  gap: 8px;
  animation: fadeUp 0.18s ease-out;
  flex-shrink: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 40px; height: 40px;
  border-radius: 8px;
  flex-shrink: 0;
  object-fit: cover;
  background: #DDD;
  border: 2px solid var(--panel-border);
}

.bubble {
  background: var(--bubble-bg);
  border: 2px solid var(--bubble-border);
  border-radius: 0 12px 12px 12px;
  padding: 6px 12px;
  max-width: 240px;
  word-break: break-all;
  position: relative;
  box-shadow: 2px 2px 0 var(--bubble-border);
}
.bubble-author {
  font-size: 13px;
  font-weight: 900;
  margin-bottom: 2px;
}
.author-0 { color: var(--normal); }
.author-1 { color: var(--member); }
.author-2 { color: var(--admin); }
.author-3 { color: var(--owner); }

.bubble-content {
  font-size: 19px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

/* 礼物 / 舰长 */
.msg-inline {
  display: flex;
  padding: 3px 10px;
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
}
.msg-inline .inline-text {
  font-size: 15px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  border: 2px solid;
}
.msg-gift   .inline-text { color: #B07800; background: #FFF8D6; border-color: #FFD070; }
.msg-member .inline-text { color: #007A40; background: #D6F5E8; border-color: #70DBA8; }

/* 醒目留言 */
.msg-sc-wrap {
  margin: 5px 10px;
  padding: 8px 12px;
  border-left: 4px solid var(--orange);
  background: #FFF0E8;
  border-radius: 0 10px 10px 0;
  border: 2px solid #FFD0B0;
  border-left: 4px solid var(--orange);
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
  box-shadow: 2px 2px 0 #FFD0B0;
}
.sc-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.sc-author { font-size: 16px; font-weight: 900; color: var(--orange); }
.sc-price  { font-size: 14px; font-weight: 900; color: var(--gold); }
.sc-body   { font-size: 19px; font-weight: 700; color: var(--text); word-break: break-all; }
</style>
</head>
<body>
<div id="layout">

  <!-- 左侧信息面板 -->
  <div class="panel" id="left-panel">
    <div id="cam-area">
      <div class="cam-frame"></div>
      <span id="cam-label">PLAYER CAM</span>
    </div>
    <div class="sf6-stripe"></div>
    <div id="announcement-body"></div>
    <div id="schedule-body"></div>
    <div id="ticker-wrap">
      <div id="ticker-track">
        <span class="ticker-text" id="ticker-text"></span>
        <span class="ticker-text" id="ticker-text2"></span>
      </div>
    </div>
  </div>

  <!-- 中间透明区域 -->
  <div id="center"></div>

  <!-- 右侧弹幕面板 -->
  <div class="panel" id="right-panel">
    <div id="chat-list"></div>
  </div>

</div>

<script src="./blcsdk.js"></script>
<script>
const MAX = 60
const list = document.getElementById('chat-list')
const TYPE_TEXT = 0, TYPE_GIFT = 1, TYPE_MEMBER = 2, TYPE_SC = 3

const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" rx="8" fill="%23DDD"/></svg>'

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function push(el) {
  list.appendChild(el)
  while (list.children.length > MAX) list.removeChild(list.firstChild)
}
function byId(id) { return list.querySelector(`[data-id="${CSS.escape(id)}"]`) }

class Handler extends blcsdk.MsgHandler {
  addMsg(msg) {
    switch (msg.type) {
      case TYPE_TEXT:   this._text(msg);   break
      case TYPE_GIFT:   this._gift(msg);   break
      case TYPE_MEMBER: this._member(msg); break
      case TYPE_SC:     this._sc(msg);     break
    }
  }

  _text(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-text'
    div.dataset.id = msg.id
    const avatar = msg.avatarUrl || DEFAULT_AVATAR
    const ac = msg.authorType ?? 0
    div.innerHTML = `
      <img class="msg-avatar" src="${esc(avatar)}" onerror="this.src='${DEFAULT_AVATAR}'">
      <div class="bubble">
        <div class="bubble-author author-${ac}">${esc(msg.authorName)}</div>
        <div class="bubble-content">${esc(msg.content)}</div>
      </div>`
    push(div)
  }

  _gift(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-gift'
    div.dataset.id = msg.id
    const price = msg.price > 0 ? ` ¥${msg.price}` : ''
    div.innerHTML = `<span class="inline-text">🎁 ${esc(msg.authorName)} 送出 ${esc(msg.giftName)} ×${msg.num}${price}</span>`
    push(div)
  }

  _member(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-member'
    div.dataset.id = msg.id
    div.innerHTML = `<span class="inline-text">⚔ ${esc(msg.authorName)} 开通了舰长</span>`
    push(div)
  }

  _sc(msg) {
    const div = document.createElement('div')
    div.className = 'msg-sc-wrap'
    div.dataset.id = msg.id
    div.innerHTML = `
      <div class="sc-top">
        <span class="sc-author">${esc(msg.authorName)}</span>
        <span class="sc-price">¥${msg.price}</span>
      </div>
      <div class="sc-body">${esc(msg.content)}</div>`
    push(div)
  }

  delMsgs(ids) {
    for (const id of ids) { const el = byId(id); if (el) el.remove() }
  }

  updateMsg(id, vals) {
    const el = byId(id)
    if (!el || !vals.translation) return
    let t = el.querySelector('.translation')
    if (!t) {
      t = document.createElement('div')
      t.className = 'bubble-content translation'
      t.style.cssText = 'color:#999;font-size:15px'
      el.querySelector('.bubble')?.appendChild(t)
    }
    t.textContent = vals.translation
  }
}

blcsdk.setMsgHandler(new Handler())
blcsdk.init().catch(console.error)

/* ── 信息面板 ── */
async function loadContent() {
  try {
    const r = await fetch('./content.json?_=' + Date.now())
    if (!r.ok) return
    const data = await r.json()
    document.getElementById('announcement-body').textContent = data.announcement || ''
    document.getElementById('schedule-body').textContent = data.schedule || ''
    const ticker = data.ticker || ''
    document.getElementById('ticker-text').textContent = ticker
    document.getElementById('ticker-text2').textContent = ticker
  } catch(e) { console.error('content.json 加载失败', e) }
}

loadContent()
setInterval(loadContent, 30000)
</script>
</body>
</html>
