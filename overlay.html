<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="referrer" content="no-referrer">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1B1730;
  --bg2:      #241E3F;
  --bg3:      #2E2655;
  --cyan:     #00D4AA;
  --gold:     #FFB800;
  --rose:     #FF5577;
  --member:   #00D4AA;
  --admin:    #FFB800;
  --owner:    #FF5577;
  --normal:   #C8C0E0;
  --text:     #F0ECFF;
  --dim:      #7870A0;
}

html, body {
  width: 2560px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Noto Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
}

#layout {
  display: flex;
  width: 2560px;
  height: 1080px;
}

#center {
  flex: 0 0 1920px;
  height: 1080px;
  background: transparent;
  pointer-events: none;
}

/* ════════════════════════
   侧边栏通用
   ════════════════════════ */
.panel {
  flex: 0 0 320px;
  height: 1080px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* 顶部彩虹渐变边 */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--gold), var(--rose));
  z-index: 10;
}

/* 左侧竖条装饰 */
#left-panel::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 2px; height: 100%;
  background: linear-gradient(180deg,
    transparent 0%,
    var(--cyan) 20%,
    var(--gold) 50%,
    var(--rose) 80%,
    transparent 100%
  );
  opacity: 0.4;
}
#right-panel::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 100%;
  background: linear-gradient(180deg,
    transparent 0%,
    var(--rose) 20%,
    var(--gold) 50%,
    var(--cyan) 80%,
    transparent 100%
  );
  opacity: 0.4;
}

/* 分隔线 */
.divider {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 20px;
  gap: 8px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--dim), transparent);
}
.divider-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
}
.divider-dot.accent { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }

/* section 区块 */
.section {
  flex-shrink: 0;
  padding: 12px 16px;
  position: relative;
}

/* section 小标题 */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}

/* ════════════════════════
   左侧：摄像头区
   ════════════════════════ */
#cam-area {
  flex-shrink: 0;
  width: 320px;
  height: 220px;
  background: #0D0B1A;
  position: relative;
}

/* 四角装饰 */
#cam-area::before,
#cam-area::after,
#cam-corner-br,
#cam-corner-tl-inner {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--cyan);
  border-style: solid;
}
#cam-area::before { top: 8px; left: 8px;    border-width: 2px 0 0 2px; }
#cam-area::after  { top: 8px; right: 8px;   border-width: 2px 2px 0 0; }
#cam-corner-br    { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; border-color: var(--gold); }
#cam-corner-bl    {
  position: absolute;
  bottom: 8px; left: 8px;
  width: 18px; height: 18px;
  border: 2px solid var(--gold);
  border-width: 0 0 2px 2px;
}

#cam-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(90deg, rgba(0,212,170,0.15), transparent);
  border-top: 1px solid rgba(0,212,170,0.3);
  padding: 4px 10px;
  font-size: 10px; font-weight: 700;
  color: var(--cyan); letter-spacing: 3px;
  text-transform: uppercase;
}

/* ════════════════════════
   左侧：文字区块
   ════════════════════════ */
#announcement-body {
  font-size: 22px;
  font-weight: 900;
  line-height: 1.6;
  color: var(--text);
}

#schedule-body {
  font-size: 19px;
  font-weight: 700;
  line-height: 1.6;
  color: var(--cyan);
}

/* ════════════════════════
   跑马灯
   ════════════════════════ */
#ticker-wrap {
  margin-top: auto;
  flex-shrink: 0;
  background: linear-gradient(90deg, var(--bg3), var(--bg2));
  border-top: 1px solid var(--bg3);
  overflow: hidden;
  height: 32px;
  display: flex;
  align-items: center;
  position: relative;
}
#ticker-wrap::before {
  content: '▶';
  flex-shrink: 0;
  color: var(--cyan);
  font-size: 10px;
  padding: 0 8px;
  opacity: 0.8;
}
#ticker-track {
  flex: 1;
  display: flex;
  white-space: nowrap;
  overflow: hidden;
  animation: ticker 22s linear infinite;
}
.ticker-text {
  font-size: 14px; font-weight: 700;
  color: var(--normal); padding-right: 80px;
}
@keyframes ticker {
  from { transform: translateX(320px); }
  to   { transform: translateX(-100%); }
}

/* ════════════════════════
   右侧：弹幕
   ════════════════════════ */
#chat-list {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 6px 0 4px;
}

/* 普通弹幕：微信气泡 */
.msg {
  display: flex;
  align-items: flex-start;
  padding: 4px 10px;
  gap: 8px;
  animation: fadeUp 0.18s ease-out;
  flex-shrink: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 38px; height: 38px;
  border-radius: 8px;
  flex-shrink: 0;
  object-fit: cover;
  background: var(--bg3);
  border: 1px solid var(--bg3);
}

.bubble {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 0 10px 10px 10px;
  padding: 5px 10px;
  max-width: 244px;
  word-break: break-all;
}
.bubble-author {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 2px;
  letter-spacing: 0.3px;
}
.author-0 { color: var(--normal); }
.author-1 { color: var(--member); }
.author-2 { color: var(--admin); }
.author-3 { color: var(--owner); }

.bubble-content {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}

/* 礼物 / 舰长 */
.msg-inline {
  display: flex;
  padding: 3px 10px;
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
}
.inline-text {
  font-size: 14px; font-weight: 700;
  padding: 3px 12px;
  border-radius: 20px;
}
.msg-gift   .inline-text {
  color: var(--gold);
  background: rgba(255,184,0,0.1);
  border: 1px solid rgba(255,184,0,0.3);
}
.msg-member .inline-text {
  color: var(--member);
  background: rgba(0,212,170,0.1);
  border: 1px solid rgba(0,212,170,0.3);
}

/* 醒目留言 */
.msg-sc-wrap {
  margin: 6px 10px;
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(255,85,119,0.12), rgba(255,184,0,0.06));
  border: 1px solid rgba(255,85,119,0.35);
  border-radius: 8px;
  flex-shrink: 0;
  animation: fadeUp 0.18s ease-out;
}
.sc-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(255,85,119,0.2);
}
.sc-author { font-size: 15px; font-weight: 900; color: var(--rose); }
.sc-price  { font-size: 13px; font-weight: 900; color: var(--gold); }
.sc-body   { font-size: 18px; font-weight: 700; color: var(--text); word-break: break-all; }
</style>
</head>
<body>
<div id="layout">

  <!-- 左侧信息面板 -->
  <div class="panel" id="left-panel">

    <div id="cam-area">
      <div id="cam-corner-br"></div>
      <div id="cam-corner-bl"></div>
      <div id="cam-label">● LIVE</div>
    </div>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-dot accent"></span>
      <span class="divider-line"></span>
    </div>

    <div class="section">
      <div class="section-label">公告</div>
      <div id="announcement-body"></div>
    </div>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-dot"></span>
      <span class="divider-line"></span>
    </div>

    <div class="section">
      <div class="section-label">今日目标</div>
      <div id="schedule-body"></div>
    </div>

    <div id="ticker-wrap">
      <div id="ticker-track">
        <span class="ticker-text" id="ticker-text"></span>
        <span class="ticker-text" id="ticker-text2"></span>
      </div>
    </div>

  </div>

  <!-- 中间透明 -->
  <div id="center"></div>

  <!-- 右侧弹幕 -->
  <div class="panel" id="right-panel">
    <div id="chat-list"></div>
  </div>

</div>

<script src="./blcsdk.js"></script>
<script>
const MAX = 60
const list = document.getElementById('chat-list')
const TYPE_TEXT = 0, TYPE_GIFT = 1, TYPE_MEMBER = 2, TYPE_SC = 3

const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="38" height="38"><rect width="38" height="38" rx="8" fill="%232E2655"/></svg>'

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function push(el) {
  list.appendChild(el)
  while (list.children.length > MAX) list.removeChild(list.firstChild)
}
function byId(id) { return list.querySelector(`[data-id="${CSS.escape(id)}"]`) }

class Handler extends blcsdk.MsgHandler {
  addMsg(msg) {
    switch (msg.type) {
      case TYPE_TEXT:   this._text(msg);   break
      case TYPE_GIFT:   this._gift(msg);   break
      case TYPE_MEMBER: this._member(msg); break
      case TYPE_SC:     this._sc(msg);     break
    }
  }
  _text(msg) {
    const div = document.createElement('div')
    div.className = 'msg'
    div.dataset.id = msg.id
    const av = msg.avatarUrl || DEFAULT_AVATAR
    div.innerHTML = `
      <img class="msg-avatar" src="${esc(av)}" onerror="this.src='${DEFAULT_AVATAR}'">
      <div class="bubble">
        <div class="bubble-author author-${msg.authorType ?? 0}">${esc(msg.authorName)}</div>
        <div class="bubble-content">${esc(msg.content)}</div>
      </div>`
    push(div)
  }
  _gift(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-gift'
    div.dataset.id = msg.id
    const price = msg.price > 0 ? ` ¥${msg.price}` : ''
    div.innerHTML = `<span class="inline-text">🎁 ${esc(msg.authorName)} · ${esc(msg.giftName)} ×${msg.num}${price}</span>`
    push(div)
  }
  _member(msg) {
    const div = document.createElement('div')
    div.className = 'msg-inline msg-member'
    div.dataset.id = msg.id
    div.innerHTML = `<span class="inline-text">⚔ ${esc(msg.authorName)} 开通了舰长</span>`
    push(div)
  }
  _sc(msg) {
    const div = document.createElement('div')
    div.className = 'msg-sc-wrap'
    div.dataset.id = msg.id
    div.innerHTML = `
      <div class="sc-top">
        <span class="sc-author">${esc(msg.authorName)}</span>
        <span class="sc-price">¥${msg.price}</span>
      </div>
      <div class="sc-body">${esc(msg.content)}</div>`
    push(div)
  }
  delMsgs(ids) {
    for (const id of ids) { const el = byId(id); if (el) el.remove() }
  }
  updateMsg(id, vals) {
    const el = byId(id)
    if (!el || !vals.translation) return
    let t = el.querySelector('.translation')
    if (!t) {
      t = document.createElement('div')
      t.className = 'bubble-content translation'
      t.style.cssText = 'color:#7870A0;font-size:14px'
      el.querySelector('.bubble')?.appendChild(t)
    }
    t.textContent = vals.translation
  }
}

blcsdk.setMsgHandler(new Handler())
blcsdk.init().catch(console.error)

async function loadContent() {
  try {
    const r = await fetch('./content.json?_=' + Date.now())
    if (!r.ok) return
    const data = await r.json()
    document.getElementById('announcement-body').textContent = data.announcement || ''
    document.getElementById('schedule-body').textContent = data.schedule || ''
    const t = data.ticker || ''
    document.getElementById('ticker-text').textContent = t
    document.getElementById('ticker-text2').textContent = t
  } catch(e) { console.error('content.json 加载失败', e) }
}

loadContent()
setInterval(loadContent, 30000)
</script>
</body>
</html>
