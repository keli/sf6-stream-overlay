<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF5500;
  --gold: #FFD700;
  --bg: #0A0A0A;
  --bg2: rgba(15, 15, 15, 0.92);
  --member: #00E87A;
  --admin: #FFD700;
  --owner: #FF5500;
  --normal: #CCCCCC;
  --sc-bg: rgba(255, 85, 0, 0.15);
}

html, body {
  width: 240px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
}

body {
  display: flex;
  flex-direction: column;
  font-family: 'Noto Sans SC', 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
}

/* ── 顶部标题 ── */
#header {
  flex-shrink: 0;
  position: relative;
  background: var(--orange);
  padding: 6px 10px 6px 12px;
  overflow: hidden;
}
#header::after {
  content: '';
  position: absolute;
  right: -8px; top: -4px;
  width: 32px; height: 44px;
  background: rgba(0,0,0,0.25);
  transform: rotate(15deg);
}
#header::before {
  content: '';
  position: absolute;
  right: 12px; top: -4px;
  width: 20px; height: 44px;
  background: rgba(0,0,0,0.15);
  transform: rotate(15deg);
}
#header .label {
  font-size: 11px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

/* 斜线装饰条 */
.sf6-stripe {
  height: 3px;
  background: repeating-linear-gradient(
    -45deg,
    var(--orange) 0px, var(--orange) 4px,
    #222 4px, #222 8px
  );
  flex-shrink: 0;
}

/* ── 消息列表 ── */
#chat-list {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 4px 0 2px;
  background: var(--bg2);
}

/* ── 通用消息行 ── */
.msg {
  padding: 2px 8px;
  animation: fadeUp 0.18s ease-out;
  flex-shrink: 0;
  line-height: 1.4;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 弹幕文本 */
.msg-text .row {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  align-items: baseline;
}
.author {
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.author-0 { color: var(--normal); }
.author-1 { color: var(--member); }
.author-2 { color: var(--admin); }
.author-3 { color: var(--owner); }

.sep { color: #444; font-size: 11px; flex-shrink: 0; }
.content { font-size: 12px; color: #DDDDDD; word-break: break-all; }

/* 礼物 */
.msg-gift .row {
  font-size: 11px;
  color: var(--gold);
}
.msg-gift .row::before { content: '🎁 '; }

/* 舰长 */
.msg-member .row {
  font-size: 11px;
  color: var(--member);
}
.msg-member .row::before { content: '⚔ '; }

/* 醒目留言 */
.msg-sc {
  margin: 4px 6px;
  padding: 4px 6px;
  border-left: 3px solid var(--orange);
  background: var(--sc-bg);
}
.msg-sc .sc-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
}
.sc-author { font-size: 11px; font-weight: 700; color: var(--orange); }
.sc-price  { font-size: 10px; font-weight: 700; color: var(--gold); }
.sc-body   { font-size: 12px; color: #EEEEEE; word-break: break-all; }
</style>
</head>
<body>
<div id="header"><span class="label">弹幕</span></div>
<div class="sf6-stripe"></div>
<div id="chat-list"></div>

<script src="/custom_public/blcsdk.js"></script>
<script>
const MAX = 60
const list = document.getElementById('chat-list')

const TYPE_TEXT = 0, TYPE_GIFT = 1, TYPE_MEMBER = 2, TYPE_SC = 3

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function push(el) {
  list.appendChild(el)
  while (list.children.length > MAX) list.removeChild(list.firstChild)
}

function byId(id) { return list.querySelector(`[data-id="${CSS.escape(id)}"]`) }

class Handler extends blcsdk.MsgHandler {
  addMsg(msg) {
    switch (msg.type) {
      case TYPE_TEXT:   this.text(msg); break
      case TYPE_GIFT:   this.gift(msg); break
      case TYPE_MEMBER: this.member(msg); break
      case TYPE_SC:     this.sc(msg); break
    }
  }

  text(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-text'
    div.dataset.id = msg.id
    div.innerHTML = `<div class="row">
      <span class="author author-${msg.authorType ?? 0}">${esc(msg.authorName)}</span>
      <span class="sep">: </span>
      <span class="content">${esc(msg.content)}</span>
    </div>`
    push(div)
  }

  gift(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-gift'
    div.dataset.id = msg.id
    const price = msg.price > 0 ? ` (¥${msg.price})` : ''
    div.innerHTML = `<div class="row">${esc(msg.authorName)} 送出 ${esc(msg.giftName)} ×${msg.num}${price}</div>`
    push(div)
  }

  member(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-member'
    div.dataset.id = msg.id
    div.innerHTML = `<div class="row">${esc(msg.authorName)} 开通了舰长</div>`
    push(div)
  }

  sc(msg) {
    const div = document.createElement('div')
    div.className = 'msg msg-sc'
    div.dataset.id = msg.id
    div.innerHTML = `
      <div class="sc-top">
        <span class="sc-author">${esc(msg.authorName)}</span>
        <span class="sc-price">¥${msg.price}</span>
      </div>
      <div class="sc-body">${esc(msg.content)}</div>`
    push(div)
  }

  delMsgs(ids) {
    for (const id of ids) {
      const el = byId(id)
      if (el) el.remove()
    }
  }

  updateMsg(id, vals) {
    const el = byId(id)
    if (!el) return
    if (vals.translation) {
      let t = el.querySelector('.translation')
      if (!t) {
        t = document.createElement('div')
        t.className = 'content translation'
        t.style.color = '#999'
        t.style.fontSize = '11px'
        el.appendChild(t)
      }
      t.textContent = vals.translation
    }
  }
}

blcsdk.setMsgHandler(new Handler())
blcsdk.init().catch(console.error)
</script>
</body>
</html>
